<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maksim Shalotenko — проекты</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --grad-1:#C9A8E0; --grad-2:#8FB8C9; --grad-3:#4FC0A8;
    --card-bg:rgba(255,255,255,0.72);
    --card-border:rgba(255,255,255,0.55);
    --text:#2B2740; --muted:#5A5470; --accent:#7C6CE0; --link:#6A5ACD;
    --row-bg:rgba(255,255,255,0.45);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --grad-1:#3A2F52; --grad-2:#2A3A46; --grad-3:#1F3A33;
      --card-bg:rgba(28,26,40,0.72);
      --card-border:rgba(255,255,255,0.10);
      --text:#ECE9F5; --muted:#A9A3BE; --accent:#9B8CF0; --link:#9B8CF0;
      --row-bg:rgba(255,255,255,0.06);
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; padding:40px 18px;
    font-family:'Onest',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:var(--text); line-height:1.62; font-size:16px;
    background:linear-gradient(135deg,var(--grad-1) 0%,var(--grad-2) 50%,var(--grad-3) 100%);
    background-attachment:fixed;
    display:flex; align-items:center; justify-content:center;
  }
  .wrap{max-width:620px; width:100%; margin:0 auto;}
  .card{
    background:var(--card-bg); border:1px solid var(--card-border);
    border-radius:24px; padding:38px 34px; backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px); box-shadow:0 12px 40px rgba(43,39,64,0.14);
  }
  h1{font-weight:800; font-size:26px; line-height:1.25; margin:0 0 6px;}
  .lead{font-size:16px; color:var(--muted); margin:0 0 24px;}
  .projects{display:flex; flex-direction:column; gap:12px;}
  .proj{
    display:block; background:var(--row-bg); border:1px solid var(--card-border);
    border-radius:16px; padding:18px 20px; text-decoration:none; color:var(--text);
    transition:transform .15s, border-color .15s;
  }
  .proj:hover{transform:translateY(-2px); border-color:var(--accent);}
  .proj .name{font-weight:700; font-size:18px; color:var(--accent); margin:0 0 2px;}
  .proj .desc{font-size:14px; color:var(--muted); margin:0;}
  .foot{color:var(--muted); font-size:13px; margin-top:26px;}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1>Проекты</h1>
<p class="lead">Небольшая витрина проектов Maksim Shalotenko.</p>
<div class="projects">
  <a class="proj" href="/easypeasyenglish/">
    <p class="name">Изи Пизи Инглиш</p>
    <p class="desc">Приложение для изучения английских слов по алгоритму интервальных повторений.</p>
  </a>
  <a class="proj" href="https://github.com/maksimshdev/marketing-agent-core" target="_blank" rel="noopener">
    <p class="name">Marketing Agent Core</p>
    <p class="desc">Репозиторий маркетинг-агента на GitHub.</p>
  </a>
</div>
<p class="foot">© 2026 Maksim Shalotenko</p>
</div>
</div>
</body>
</html>
